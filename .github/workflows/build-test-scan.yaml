name: build-test-scan

on:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    uses: security-org-230982/security-engineering/.github/workflows/secrets-scan.yaml@main
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast-scan:
    uses: security-org-230982/security-engineering/.github/workflows/static-code-scan.yaml@main

  iac-scan:
    uses: security-org-230982/security-engineering/.github/workflows/iac-static-scans.yaml@main

  sca-scan:
    uses: security-org-230982/security-engineering/.github/workflows/sca-scan.yaml@main

  build-and-test:
    runs-on: ubuntu-latest
    needs:
      - secrets-scan
      - sast-scan
      - iac-scan
      - sca-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/simple-game:${{ github.sha }}
          provenance: false