name: publish-image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/simple-game
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.publish-meta.outputs.image-ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:main
          provenance: false

      - name: Prepare published image reference
        id: publish-meta
        run: echo "image-ref=${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Add publish summary
        run: |
          echo "## Image Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image name: \`${{ env.IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA tag: \`${{ env.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Main tag: \`main\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Published digest: \`${{ steps.publish-meta.outputs.image-ref }}\`" >> "$GITHUB_STEP_SUMMARY"

  image-vulnerability-scan:
    runs-on: ubuntu-latest
    needs: build-and-publish

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Verify image is reachable
        run: docker buildx imagetools inspect "${{ needs.build-and-publish.outputs.image-ref }}"

      - name: Generate Trivy SARIF report
        run: |
          trivy image \
            --format sarif \
            --output trivy-image-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "${{ needs.build-and-publish.outputs.image-ref }}"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      - name: Generate Trivy JSON report
        run: |
          trivy image \
            --format json \
            --output trivy-image-results.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "${{ needs.build-and-publish.outputs.image-ref }}"

      - name: Add Trivy image summary
        shell: bash
        run: |
          python3 <<'PY'
          import json
          from collections import Counter

          with open("trivy-image-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          vulns = []
          for result in data.get("Results", []):
              target = result.get("Target", "")
              for v in result.get("Vulnerabilities", []) or []:
                  vulns.append({
                      "target": target,
                      "id": v.get("VulnerabilityID", "N/A"),
                      "severity": v.get("Severity", "UNKNOWN"),
                      "pkg": v.get("PkgName", "N/A"),
                      "installed": v.get("InstalledVersion", "N/A"),
                      "fixed": v.get("FixedVersion") or "N/A",
                  })

          counts = Counter(v["severity"] for v in vulns)

          with open("image-summary.md", "w", encoding="utf-8") as out:
              out.write("## Trivy Image Scan Summary\n\n")
              out.write(f"- **Image:** `{data.get('ArtifactName', 'N/A')}`\n")
              out.write(f"- **Total findings:** **{len(vulns)}**\n")
              out.write(f"- **Critical:** {counts.get('CRITICAL', 0)}\n")
              out.write(f"- **High:** {counts.get('HIGH', 0)}\n\n")

              if vulns:
                  out.write("| CVE ID | Severity | Package | Installed | Fixed | Target |\n")
                  out.write("|---|---|---|---|---|---|\n")
                  for v in vulns[:50]:
                      out.write(f"| {v['id']} | {v['severity']} | `{v['pkg']}` | `{v['installed']}` | `{v['fixed']}` | `{v['target']}` |\n")
              else:
                  out.write("No HIGH/CRITICAL vulnerabilities found in the container image.\n")

          PY

          cat image-summary.md >> "$GITHUB_STEP_SUMMARY"

      # - name: Fail on HIGH/CRITICAL vulnerabilities
      #   run: |
      #     trivy image \
      #       --severity HIGH,CRITICAL \
      #       --ignore-unfixed \
      #       --exit-code 1 \
      #       "${{ needs.build-and-publish.outputs.image-ref }}"

  image-signing:
    needs:
      - build-and-publish
      - image-vulnerability-scan
    uses: security-org-230982/security-engineering/.github/workflows/image-signing.yaml@main
    with:
      image-ref: ${{ needs.build-and-publish.outputs.image-ref }}