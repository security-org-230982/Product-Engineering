name: publish-image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/simple-game
  IMAGE_TAG: ${{ github.sha }}

jobs:
  publish-image:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.publish-meta.outputs.image-ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:main
          provenance: false

      - name: Prepare published image reference
        id: publish-meta
        run: echo "image-ref=${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  image-security-gates:
    needs: publish-image
    uses: security-org-230982/security-engineering/.github/workflows/image-signing.yaml@main
    with:
      image-ref: ${{ needs.publish-image.outputs.image-ref }}