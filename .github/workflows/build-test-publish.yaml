name: build-test-publish

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  secrets-scan:
    uses: security-org-230982/security-engineering/.github/workflows/gitleaks.yaml@main
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast-sca:
    uses: security-org-230982/security-engineering/.github/workflows/product-static-scans.yaml@main

  build-test-publish:
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast-sca]
    outputs:
      image-ref: ghcr.io/${{ github.repository_owner }}/simple-game:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/simple-game:${{ github.sha }}
          provenance: false

  image-security-gates:
    if: github.event_name != 'pull_request'
    needs: build-test-publish
    uses: security-org-230982/security-engineering/.github/workflows/image-post-build.yaml@main
    with:
      image-ref: ghcr.io/${{ github.repository_owner }}/simple-game:${{ github.sha }}
